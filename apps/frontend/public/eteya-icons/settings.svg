<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 124 124" width="119" height="119" fill="none" shape-rendering="geometricPrecision" color-interpolation-filters="sRGB" style="overflow:visible">
  <defs>
    <linearGradient id="body-settings" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5a6478"/>
      <stop offset="8%" stop-color="#4a5668"/>
      <stop offset="40%" stop-color="#2a3242"/>
      <stop offset="75%" stop-color="#131922"/>
      <stop offset="100%" stop-color="#0a0e16"/>
    </linearGradient>
    <radialGradient id="subsurface-settings" cx="53" cy="50" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a5070" stop-opacity="0.40"/>
      <stop offset="50%" stop-color="#3a5070" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#3a5070" stop-opacity="0"/>
    </radialGradient>

    <!-- V5.2.2 HIGHLIGHT STACK: Bloom (A) + Arc (B) + Core (C) -->
    <radialGradient id="bloom-settings" cx="36" cy="28" r="48"
        gradientUnits="userSpaceOnUse"
        gradientTransform="rotate(-22 36 28) scale(1 0.62)">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc-settings" x1="50" y1="8" x2="50" y2="48"
        gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="core-settings" cx="36" cy="24" r="11"
        gradientUnits="userSpaceOnUse"
        gradientTransform="rotate(-25 36 24) scale(1 0.7)">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="hdrBloom-settings" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.78"/>
    </filter>

    <linearGradient id="peakMaskGrad-settings" x1="0.5" y1="0" x2="0.5" y2="0.40">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="peakMask-settings" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="url(#peakMaskGrad-settings)"/>
    </mask>
    <linearGradient id="rimMaskGrad-settings" x1="0.5" y1="0.4" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.475"/>
      <stop offset="75%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.85"/>
    </linearGradient>
    <mask id="rimMask-settings" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="url(#rimMaskGrad-settings)"/>
    </mask>
    <filter id="rimMicroBlur-settings" color-interpolation-filters="sRGB"><feGaussianBlur stdDeviation="0.35"/></filter>
    <filter id="rimUnderglow-settings" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="rgb"/>
      <feSpecularLighting in="rgb" surfaceScale="1.2" specularConstant="2.0" specularExponent="22" lighting-color="#e8f1ff" result="rs">
        <feDistantLight azimuth="315" elevation="18"/>
      </feSpecularLighting>
      <feComposite in="rs" in2="SourceAlpha" operator="in"/>
    </filter>
    <filter id="rimBand-settings" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feMorphology operator="dilate" radius="1" in="SourceAlpha" result="rd"/>
      <feComposite in="rd" in2="SourceAlpha" operator="out" result="rr"/>
      <feOffset in="rr" dx="0" dy="0.3" result="ro"/>
      <feFlood flood-color="#e8f1ff" flood-opacity="0.85" result="rc"/>
      <feComposite in="rc" in2="ro" operator="in" result="rcd"/>
      <feGaussianBlur in="rcd" stdDeviation="0.25"/>
    </filter>
    <filter id="outerHalo-settings" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.4" result="hb"/>
      <feFlood flood-color="#aac4ff" flood-opacity="0.40" result="hc"/>
      <feComposite in="hc" in2="hb" operator="in" result="halo"/>
      <feMerge><feMergeNode in="halo"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="thicknessHalo-settings" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feMorphology operator="dilate" radius="0.45" in="SourceAlpha" result="d"/>
      <feFlood flood-color="#050810" flood-opacity="0.55" result="hc"/>
      <feComposite in="hc" in2="d" operator="in" result="h"/>
      <feGaussianBlur in="h" stdDeviation="0.4" result="hb"/>
      <feMerge><feMergeNode in="hb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerEdgeFade-settings" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feMorphology operator="erode" radius="0.8" in="SourceAlpha" result="er"/>
      <feComposite in="SourceAlpha" in2="er" operator="out" result="ib"/>
      <feGaussianBlur in="ib" stdDeviation="0.35" result="ibb"/>
      <feFlood flood-color="#050810" flood-opacity="0.6"/>
      <feComposite in2="ibb" operator="in" result="dr"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode in="dr"/></feMerge>
    </filter>
    <filter id="ambientGround-settings" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="wb"/>
      <feFlood flood-color="#aac4ff" flood-opacity="0.18" result="wc"/>
      <feComposite in="wc" in2="wb" operator="in" result="wg"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="tb"/>
      <feOffset in="tb" dx="0" dy="2" result="to"/>
      <feFlood flood-color="#aac4ff" flood-opacity="0.25" result="tc"/>
      <feComposite in="tc" in2="to" operator="in" result="tg"/>
      <feMerge><feMergeNode in="wg"/><feMergeNode in="tg"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="shape-settings" d="M 50 8 L 56 8 Q 60 8 60 12 L 60 18 Q 65 19 70 22 L 75 18 Q 78 16 80 19 L 84 23 Q 86 26 84 28 L 80 33 Q 83 38 84 43 L 90 43 Q 94 43 94 47 L 94 53 Q 94 57 90 57 L 84 57 Q 83 62 80 67 L 84 72 Q 86 74 84 77 L 80 81 Q 78 84 75 82 L 70 78 Q 65 81 60 82 L 60 88 Q 60 92 56 92 L 50 92 Q 46 92 46 88 L 46 82 Q 41 81 36 78 L 31 82 Q 28 84 26 81 L 22 77 Q 20 74 22 72 L 26 67 Q 23 62 22 57 L 16 57 Q 12 57 12 53 L 12 47 Q 12 43 16 43 L 22 43 Q 23 38 26 33 L 22 28 Q 20 26 22 23 L 26 19 Q 28 16 31 18 L 36 22 Q 41 19 46 18 L 46 12 Q 46 8 50 8 Z M 53 35 A 15 15 0 1 0 53 65 A 15 15 0 1 0 53 35 Z"/>
  </defs>
  <g filter="url(#outerHalo-settings)">
    <g filter="url(#ambientGround-settings)">
      <g filter="url(#thicknessHalo-settings)">
        <use href="#shape-settings" fill="url(#body-settings)"/>
        <use href="#shape-settings" fill="url(#subsurface-settings)" style="mix-blend-mode:screen;opacity:0.88"/>
        <use href="#shape-settings" fill="url(#bloom-settings)" style="mix-blend-mode:screen"/>
        <use href="#shape-settings" fill="url(#arc-settings)" style="mix-blend-mode:screen"/>
      <use href="#shape-settings" fill="url(#core-settings)" filter="url(#hdrBloom-settings)" style="mix-blend-mode:screen;opacity:0.6"/>
        <use href="#shape-settings" fill="url(#body-settings)" filter="url(#rimUnderglow-settings)" style="mix-blend-mode:screen;opacity:0.85"/>
        <g mask="url(#rimMask-settings)">
          <use href="#shape-settings" fill="url(#body-settings)" filter="url(#rimBand-settings)" style="mix-blend-mode:screen;opacity:0.55"/>
        </g>
        <use href="#shape-settings" fill="url(#body-settings)" filter="url(#innerEdgeFade-settings)" style="mix-blend-mode:multiply;opacity:0.3"/>
        <use href="#shape-settings" fill="none" stroke="#fafcff" stroke-opacity="0.65" stroke-width="0.55" mask="url(#peakMask-settings)" filter="url(#rimMicroBlur-settings)" style="mix-blend-mode:screen"/>
      </g>
    </g>
  </g>
</svg>
